<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>безусловност · тегли послание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --burgundy:#5A2235;
    --cream:#F6F4F1;
    --terracotta:#84221C;
    --tan:#DDD4B8;
    --black:#000000;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--cream);
    font-family:'Lora', serif;
    color:var(--black);
    padding:24px;
  }
  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:26px;
    width:100%;
    max-width:400px;
  }
  .wordmark{
    font-family:'Montserrat', sans-serif;
    font-size:13px;
    letter-spacing:0.22em;
    text-transform:lowercase;
    color:var(--black);
  }
  .wordmark .dot{color:var(--terracotta);}
  .deck{
    perspective:1200px;
    width:min(300px, 78vw);
    aspect-ratio:4/5;
  }
  .card{
    width:100%;
    height:100%;
    border-radius:16px;
    box-shadow:0 18px 40px rgba(0,0,0,0.16);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
    overflow:hidden;
    transform:rotateY(0deg);
    will-change:transform;
    background:var(--cream);
  }
  .card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .card.closed{
    border:1px solid rgba(0,0,0,0.12);
    flex-direction:column;
    padding:30px;
  }
  .card.release-fallback{
    background:var(--cream);
    color:var(--black);
    border:1px solid rgba(90,34,53,0.15);
    padding:34px 28px;
    flex-direction:column;
  }
  .dot-big{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--terracotta);
    margin-bottom:20px;
  }
  .hint{
    font-family:'Montserrat', sans-serif;
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:lowercase;
    color:rgba(0,0,0,0.55);
    margin:0;
  }
  .release-mark{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--burgundy);
    margin-bottom:16px;
  }
  .release-text{
    font-style:normal;
    font-weight:400;
    font-size:18px;
    line-height:1.55;
    margin:0;
  }
  .draw-btn{
    font-family:'Montserrat', sans-serif;
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:lowercase;
    background:var(--black);
    color:var(--cream);
    border:none;
    padding:15px 34px;
    border-radius:999px;
    cursor:pointer;
    transition:opacity 0.2s ease, transform 0.15s ease;
  }
  .draw-btn:hover{opacity:0.85;}
  .draw-btn:active{transform:scale(0.97);}
  .draw-btn:disabled{opacity:0.45;cursor:default;}
  .step-hint{
    font-family:'Montserrat', sans-serif;
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:lowercase;
    color:rgba(0,0,0,0.4);
    height:14px;
  }
  .handle{
    font-family:'Montserrat', sans-serif;
    font-size:11px;
    letter-spacing:0.1em;
    color:rgba(0,0,0,0.4);
    margin:0;
  }
  @media (prefers-reduced-motion: reduce){
    .card{transition:none !important;}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="wordmark">безусловност<span class="dot">.</span></div>

    <div class="deck">
      <div class="card closed" id="card">
        <div class="dot-big"></div>
        <p class="hint">тегли послание</p>
      </div>
    </div>

    <p class="step-hint" id="stepHint">&nbsp;</p>
    <button class="draw-btn" id="drawBtn">тегли послание</button>
    <p class="handle">@bezuslovnost</p>
  </div>

<script>
  const themes = [
    {n:"01", slug:"mekota", release:"позволявам си да съм мека, това не е слабост"},
    {n:"02", slug:"pochivka", release:"почивката не се заслужава, тя е право, не награда"},
    {n:"03", slug:"stoynost", release:"моята стойност не се измерва с числата в банковата ми сметка"},
    {n:"04", slug:"dostatachna", release:"стойностна съм и в почивен ден"},
    {n:"05", slug:"ogledalo", release:"обичат ме и в разчорлените ми дни, даже може би точно в тях"},
    {n:"06", slug:"tsyala", release:"не съм проект, не трябва да раста, за да струвам"},
    {n:"07", slug:"poluchavam", release:"позволявам си да получавам, просто така, без защото"},
    {n:"08", slug:"mayka", release:"децата ми имат нужда от щастлива майка, не от безгрешна"},
    {n:"09", slug:"obichana", release:"обичат ме заради това коя съм, не заради това какво правя"},
    {n:"10", slug:"mnogo", release:"не съм прекалено много, просто не всеки има място за мен"},
    {n:"11", slug:"tyalo", release:"тялото ми не е за поправяне, то е домът ми"},
    {n:"12", slug:"ne", release:"моето не пази моето да"},
    {n:"13", slug:"ritam", release:"не съм в ничия надпревара, вървя в свой ритъм"},
    {n:"14", slug:"greshka", release:"греша, значи опитвам, значи живея"},
    {n:"15", slug:"sama", release:"сама не е присъда, понякога е почивка, понякога е избор"},
    {n:"16", slug:"dalech", release:"обичта ми пътува без багаж, разстоянието не я мери"},
    {n:"17", slug:"glas", release:"гласът ми има място, дори когато трепери"},
    {n:"18", slug:"vreme", release:"не съм закъсняла, животът не е разписание"},
    {n:"19", slug:"pomosht", release:"искам помощ, това е доверие, не слабост"},
    {n:"20", slug:"minalo", release:"всяка предишна аз ме е довела дотук"},
    {n:"21", slug:"radost", release:"радостта ми не иска повод, само позволение"},
    {n:"22", slug:"mechta", release:"мечтая сега, после не е обещано", noReleaseImg:true}
  ];

  let deck = [];
  let lastSlug = null;

  function reshuffle(){
    deck = themes.map((_, i) => i);
    for(let i = deck.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    if(deck.length > 1 && themes[deck[0]].slug === lastSlug){
      [deck[0], deck[1]] = [deck[1], deck[0]];
    }
  }

  function nextItem(){
    if(deck.length === 0) reshuffle();
    const idx = deck.pop();
    lastSlug = themes[idx].slug;
    return themes[idx];
  }

  const card = document.getElementById('card');
  const btn = document.getElementById('drawBtn');
  const stepHint = document.getElementById('stepHint');
  let busy = false;

  function flipTo(renderFn){
    return new Promise(resolve => {
      card.style.transition = 'transform 0.35s cubic-bezier(.4,0,.2,1)';
      card.style.transform = 'rotateY(90deg)';
      setTimeout(() => {
        renderFn();
        card.style.transform = 'rotateY(0deg)';
        setTimeout(resolve, 360);
      }, 350);
    });
  }

  function imgPath(item, kind){
    return `images/${item.n}-${kind}-${item.slug}.jpg`;
  }

  function renderImage(item, kind){
    card.className = 'card';
    card.innerHTML = `<img src="${imgPath(item, kind)}" alt="${kind} ${item.slug}">`;
  }

  function renderReleaseFallback(item){
    card.className = 'card release-fallback';
    card.innerHTML = `
      <div class="release-mark"></div>
      <p class="release-text">${item.release}</p>
    `;
  }

  const wait = ms => new Promise(r => setTimeout(r, ms));

  async function draw(){
    if(busy) return;
    busy = true;
    btn.disabled = true;

    const item = nextItem();

    stepHint.textContent = 'правилото';
    await flipTo(() => renderImage(item, 'rule'));
    await wait(1500);

    stepHint.textContent = 'илюстрация';
    await flipTo(() => renderImage(item, 'illustration'));
    await wait(1500);

    stepHint.textContent = 'освобождаването';
    if(item.noReleaseImg){
      await flipTo(() => renderReleaseFallback(item));
    } else {
      await flipTo(() => renderImage(item, 'release'));
    }
    stepHint.textContent = '\u00A0';

    btn.textContent = 'нова карта';
    btn.disabled = false;
    busy = false;
  }

  btn.addEventListener('click', draw);
</script>
</body>
</html>
