<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>безусловност · тегли послание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --burgundy:#5A2235;
    --cream:#F6F4F1;
    --terracotta:#84221C;
    --tan:#DDD4B8;
    --black:#000000;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--cream);
    font-family:'Lora', serif;
    color:var(--black);
    padding:24px;
  }
  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
    width:100%;
    max-width:420px;
  }
  .wordmark{
    font-family:'Montserrat', sans-serif;
    font-size:13px;
    letter-spacing:0.22em;
    text-transform:lowercase;
    color:var(--black);
  }
  .wordmark .dot{color:var(--terracotta);}
  .deck{
    perspective:1200px;
    width:min(320px, 82vw);
    aspect-ratio:5/7;
  }
  .card{
    width:100%;
    height:100%;
    border-radius:20px;
    box-shadow:0 18px 40px rgba(0,0,0,0.14);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:36px 30px;
    transform:rotateY(0deg);
    will-change:transform;
    position:relative;
    overflow:hidden;
  }
  .card.closed{
    background:var(--cream);
    border:1px solid rgba(0,0,0,0.12);
  }
  .card.rule{
    background:var(--burgundy);
    color:var(--cream);
  }
  .card.release{
    background:var(--cream);
    color:var(--black);
    border:1px solid rgba(90,34,53,0.15);
  }
  .dot-big{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--terracotta);
    margin-bottom:22px;
  }
  .hint{
    font-family:'Montserrat', sans-serif;
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:lowercase;
    color:rgba(0,0,0,0.55);
    margin:0;
  }
  .rule-wrap{
    position:relative;
    display:inline-block;
  }
  .rule-text{
    font-style:italic;
    font-weight:400;
    font-size:20px;
    line-height:1.5;
    margin:0;
  }
  .strike{
    position:absolute;
    left:-4%;
    top:38%;
    width:108%;
    height:24px;
    overflow:visible;
  }
  .strike path{
    fill:none;
    stroke:var(--tan);
    stroke-width:1.6;
    stroke-linecap:round;
    stroke-dasharray:340;
    stroke-dashoffset:340;
  }
  .strike.draw path{
    transition:stroke-dashoffset 0.85s ease;
    stroke-dashoffset:0;
  }
  .release-text{
    font-style:normal;
    font-weight:400;
    font-size:19px;
    line-height:1.55;
    margin:0;
  }
  .release-mark{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--burgundy);
    margin-bottom:18px;
  }
  .draw-btn{
    font-family:'Montserrat', sans-serif;
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:lowercase;
    background:var(--black);
    color:var(--cream);
    border:none;
    padding:15px 34px;
    border-radius:999px;
    cursor:pointer;
    transition:opacity 0.2s ease, transform 0.15s ease;
  }
  .draw-btn:hover{opacity:0.85;}
  .draw-btn:active{transform:scale(0.97);}
  .draw-btn:disabled{opacity:0.45;cursor:default;}
  .handle{
    font-family:'Montserrat', sans-serif;
    font-size:11px;
    letter-spacing:0.1em;
    color:rgba(0,0,0,0.4);
    margin:0;
  }
  @media (prefers-reduced-motion: reduce){
    .card, .strike path{transition:none !important;}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="wordmark">безусловност<span class="dot">.</span></div>

    <div class="deck">
      <div class="card closed" id="card">
        <div class="dot-big"></div>
        <p class="hint">тегли послание</p>
      </div>
    </div>

    <button class="draw-btn" id="drawBtn">тегли послание</button>
    <p class="handle">@bezuslovnost</p>
  </div>

<script>
  const messages = [
    {rule:"омръзна ми да се държа като мъж", release:"позволявам си да съм мека, това не е слабост"},
    {rule:"не мога да си позволя да почивам твърде дълго", release:"почивката не се заслужава, тя е право, не награда"},
    {rule:"стойностна съм само ако печеля пари", release:"моята стойност не се измерва с числата в банковата ми сметка"},
    {rule:"стойностна съм само ако съм продуктивна", release:"стойностна съм и в почивен ден"},
    {rule:"достойна съм за любов само ако изглеждам добре", release:"обичат ме и в разчорлените ми дни, даже може би точно в тях"},
    {rule:"стойностна съм само ако постоянно раста и постигам", release:"не съм проект, не трябва да раста, за да струвам"},
    {rule:"мога да получавам само ако първо съм дала", release:"позволявам си да получавам, просто така, без защото"},
    {rule:"достойна майка съм само ако съм перфектна", release:"децата ми имат нужда от щастлива майка, не от безгрешна"},
    {rule:"обичат ме само заради това, което давам", release:"обичат ме заради това коя съм, не заради това какво правя"},
    {rule:"прекалено много съм, твърде активна, твърде комплексна", release:"не съм прекалено много, просто не всеки има място за мен"},
    {rule:"тялото ми е списък с недостатъци", release:"тялото ми не е за поправяне, то е домът ми"},
    {rule:"лоша съм, ако кажа не", release:"моето не пази моето да"},
    {rule:"изоставам от всички на моята възраст", release:"не съм в ничия надпревара, вървя в свой ритъм"},
    {rule:"нямам право да греша", release:"греша, значи опитвам, значи живея"},
    {rule:"ако съм сама, значи нещо ми е сбъркано", release:"сама не е присъда, понякога е почивка, понякога е избор"},
    {rule:"добра дъщеря съм само ако съм наблизо", release:"обичта ми пътува без багаж, разстоянието не я мери"},
    {rule:"по-добре да замълча, за да не преча", release:"гласът ми има място, дори когато трепери"},
    {rule:"късно ми е вече за ново начало", release:"не съм закъсняла, животът не е разписание"},
    {rule:"да поискам помощ е да призная провал", release:"искам помощ, това е доверие, не слабост"},
    {rule:"срам ме е от жената, която бях", release:"всяка предишна аз ме е довела дотук"},
    {rule:"несериозно е да се радвам като дете", release:"радостта ми не иска повод, само позволение"},
    {rule:"мечтите са за после, като свърша всичко", release:"мечтая сега, после не е обещано"}
  ];

  let deck = [];
  let lastIdx = null;

  function reshuffle(){
    deck = messages.map((_, i) => i);
    for(let i = deck.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    if(deck.length > 1 && deck[0] === lastIdx){
      [deck[0], deck[1]] = [deck[1], deck[0]];
    }
  }

  function nextCard(){
    if(deck.length === 0) reshuffle();
    const idx = deck.pop();
    lastIdx = idx;
    return messages[idx];
  }

  const card = document.getElementById('card');
  const btn = document.getElementById('drawBtn');
  let busy = false;

  function flipTo(renderFn){
    return new Promise(resolve => {
      card.style.transition = 'transform 0.35s cubic-bezier(.4,0,.2,1)';
      card.style.transform = 'rotateY(90deg)';
      setTimeout(() => {
        renderFn();
        card.style.transform = 'rotateY(0deg)';
        setTimeout(resolve, 360);
      }, 350);
    });
  }

  function renderRule(item){
    card.className = 'card rule';
    card.innerHTML = `
      <div>
        <div class="rule-wrap">
          <p class="rule-text" id="ruleText">${item.rule}</p>
          <svg class="strike" id="strike" viewBox="0 0 300 24" preserveAspectRatio="none">
            <path d="M4,14 Q150,4 296,15" />
          </svg>
        </div>
      </div>
    `;
  }

  function renderRelease(item){
    card.className = 'card release';
    card.innerHTML = `
      <div>
        <div class="release-mark"></div>
        <p class="release-text">${item.release}</p>
      </div>
    `;
  }

  async function draw(){
    if(busy) return;
    busy = true;
    btn.disabled = true;

    const item = nextCard();

    await flipTo(() => renderRule(item));

    await new Promise(r => setTimeout(r, 1100));

    const strike = document.getElementById('strike');
    strike.classList.add('draw');

    await new Promise(r => setTimeout(r, 950));
    await new Promise(r => setTimeout(r, 250));

    await flipTo(() => renderRelease(item));

    btn.textContent = 'нова карта';
    btn.disabled = false;
    busy = false;
  }

  btn.addEventListener('click', draw);
</script>
</body>
</html>
